<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>404 — ページが見つかりません / 柴田研究室</title>
  <meta http-equiv="refresh" content="3;url=./" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Inter','Noto Sans JP','Hiragino Sans','Yu Gothic',system-ui,sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #08102b 0%, #050818 60%);
      color: #e5edff;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 32px;
    }
    .card {
      max-width: 560px;
      padding: 40px 36px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    h1 {
      font-size: 56px;
      margin: 0 0 8px;
      background: linear-gradient(90deg,#22D3EE,#3B82F6,#8B5CF6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    p { line-height: 1.7; opacity: 0.85; margin: 8px 0; }
    a {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 20px;
      border-radius: 999px;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(90deg,#3B82F6,#8B5CF6);
      transition: transform .2s ease;
    }
    a:hover { transform: translateY(-2px); }
    small { display: block; margin-top: 14px; opacity: 0.55; }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <p>お探しのページは見つかりませんでした。<br/>The page you requested could not be found.</p>
    <a href="./">トップへ戻る / Back to home</a>
    <small>3 秒後に自動でトップへ移動します。</small>
  </main>
</body>
</html>
